<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FVN Debattverktøy</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101112;
        color: #f5f5f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #101112;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button,
      select,
      input,
      textarea {
        border: 1px solid #3a3d3f;
        border-radius: 8px;
        background: #17191b;
        color: #f5f5f0;
      }

      button,
      select {
        min-height: 40px;
      }

      button {
        cursor: pointer;
        font-weight: 700;
        padding: 0 12px;
      }

      button:hover {
        border-color: #e5e1d5;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      input,
      textarea {
        padding: 10px 12px;
        width: 100%;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      header {
        align-items: center;
        border-bottom: 1px solid #2b2e30;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        min-height: 72px;
        padding: 14px 24px;
      }

      .brand {
        align-items: center;
        display: flex;
        gap: 12px;
        min-width: 0;
      }

      .brand img {
        border-radius: 4px;
        height: 32px;
        object-fit: contain;
        width: 32px;
      }

      h1 {
        font-size: 1.15rem;
        letter-spacing: 0;
        margin: 0;
      }

      .muted {
        color: #b7b7af;
      }

      .top-actions {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      main {
        display: grid;
        gap: 0;
        grid-template-columns: 360px minmax(0, 1fr);
        min-height: calc(100vh - 72px);
      }

      aside {
        border-right: 1px solid #2b2e30;
        padding: 18px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(360px, 0.9fr) minmax(420px, 1.1fr);
        min-width: 0;
      }

      section {
        min-width: 0;
      }

      .panel {
        border-bottom: 1px solid #2b2e30;
        padding: 18px;
      }

      aside .panel {
        border: 0;
        padding: 0 0 22px;
      }

      h2 {
        font-size: 0.95rem;
        margin: 0 0 12px;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .row {
        align-items: center;
        display: flex;
        gap: 10px;
      }

      .row > * {
        min-width: 0;
      }

      .status-grid {
        display: grid;
        gap: 8px;
      }

      .status-line {
        align-items: center;
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .badge {
        border: 1px solid #3a3d3f;
        border-radius: 999px;
        color: #d6d2c8;
        font-size: 0.8rem;
        padding: 4px 9px;
        white-space: nowrap;
      }

      .badge.ok {
        border-color: #4f8f66;
        color: #91d6a9;
      }

      .badge.warn {
        border-color: #9d7d3d;
        color: #e7c16b;
      }

      .list {
        border-right: 1px solid #2b2e30;
        min-height: calc(100vh - 72px);
      }

      .top-overview {
        border-bottom: 1px solid #2b2e30;
        padding: 14px 18px 16px;
      }

      .overview-header {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .list-toolbar {
        align-items: center;
        border-bottom: 1px solid #2b2e30;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        padding: 14px 18px;
      }

      .items {
        display: grid;
      }

      .item-row {
        border: 0;
        border-bottom: 1px solid #242729;
        border-radius: 0;
        display: grid;
        gap: 5px;
        justify-items: stretch;
        min-height: 92px;
        padding: 13px 18px;
        text-align: left;
        width: 100%;
      }

      .item-row.active {
        background: #202326;
        border-left: 4px solid #d9b45d;
      }

      .item-title {
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .item-meta {
        color: #b7b7af;
        display: flex;
        flex-wrap: wrap;
        font-size: 0.85rem;
        gap: 8px;
      }

      .detail {
        min-height: calc(100vh - 72px);
      }

      .detail-header {
        border-bottom: 1px solid #2b2e30;
        padding: 18px;
      }

      .detail-title {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }

      .detail-body {
        display: grid;
        gap: 18px;
        padding: 18px;
      }

      .body-text {
        background: #141618;
        border: 1px solid #2b2e30;
        border-radius: 8px;
        line-height: 1.55;
        max-height: 360px;
        overflow: auto;
        padding: 14px;
        white-space: pre-wrap;
      }

      .score-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }

      .score {
        border: 1px solid #2b2e30;
        border-radius: 8px;
        padding: 10px;
      }

      .score strong {
        display: block;
        font-size: 1.25rem;
      }

      .notice {
        border: 1px solid #50442b;
        border-radius: 8px;
        color: #e7c16b;
        padding: 12px;
      }

      .story-list {
        border-top: 1px solid #2b2e30;
        display: grid;
        gap: 10px;
        margin-top: 4px;
        padding-top: 12px;
      }

      .story-row {
        border: 1px solid #2b2e30;
        border-radius: 8px;
        color: inherit;
        display: grid;
        gap: 4px;
        padding: 10px;
        text-decoration: none;
      }

      .story-row:hover {
        border-color: #e5e1d5;
      }

      .story-title {
        font-weight: 750;
        line-height: 1.25;
      }

      .story-meta {
        color: #b7b7af;
        font-size: 0.82rem;
      }

      .top-list {
        display: grid;
        gap: 8px;
        max-height: 280px;
        overflow: auto;
      }

      .top-row {
        border: 1px solid #2b2e30;
        border-radius: 8px;
        display: grid;
        gap: 6px;
        padding: 10px;
        text-align: left;
        width: 100%;
      }

      .top-row.active {
        background: #202326;
        border-color: #d9b45d;
      }

      .top-title {
        font-weight: 800;
        line-height: 1.25;
      }

      .top-meta {
        color: #b7b7af;
        font-size: 0.82rem;
      }

      .error {
        color: #ff9b92;
      }

      pre {
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 980px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        main,
        .workspace {
          grid-template-columns: 1fr;
        }

        aside,
        .list {
          border-right: 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <img id="newsroomLogo" alt="" hidden />
        <div>
          <h1>FVN Debattverktøy</h1>
          <div id="userLine" class="muted">Sjekker innlogging...</div>
        </div>
      </div>
      <div class="top-actions">
        <button type="button" id="loginButton">Plan3-login</button>
        <button type="button" id="logoutButton">Logg ut</button>
      </div>
    </header>

    <main>
      <aside>
        <section class="panel">
          <h2>Status</h2>
          <div class="status-grid">
            <div class="status-line">
              <span>Plan3</span>
              <span id="plan3Status" class="badge warn">Sjekker</span>
            </div>
            <div class="status-line">
              <span>Supabase</span>
              <span id="supabaseStatus" class="badge warn">Ikke satt</span>
            </div>
            <div class="status-line">
              <span>Outlook</span>
              <span id="graphStatus" class="badge warn">Ikke satt</span>
            </div>
            <div class="status-line">
              <span>FVN-saker</span>
              <span id="fvnStatus" class="badge warn">Ikke hentet</span>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>Innhenting</h2>
          <div class="stack">
            <button type="button" id="importButton">Importer siste 25 fra Outlook</button>
            <button type="button" id="previewMailButton">Forhåndsvis siste 10</button>
            <button type="button" id="importFvnButton">Hent FVN-saker siste 14 dager</button>
            <button type="button" id="refreshButton">Oppdater liste</button>
            <div id="sideMessage" class="muted"></div>
            <div id="fvnStories" class="story-list"></div>
          </div>
        </section>

        <section class="panel">
          <h2>Manuell test</h2>
          <form id="manualForm" class="stack">
            <input name="subject" placeholder="Tittel/emne" autocomplete="off" />
            <input name="sender_name" placeholder="Avsendernavn" autocomplete="off" />
            <input name="sender_email" placeholder="Avsender e-post" autocomplete="off" />
            <textarea name="body_text" placeholder="Lim inn leserinnlegg"></textarea>
            <button type="submit">Lagre manuelt innlegg</button>
          </form>
        </section>
      </aside>

      <div class="workspace">
        <section class="list">
          <div class="top-overview">
            <div class="overview-header">
              <div>
                <strong>Beste vurderte</strong>
                <div class="muted">Rangert etter samlet vurderingsscore</div>
              </div>
              <button type="button" id="refreshTopButton">Oppdater</button>
            </div>
            <div id="topItems" class="top-list"></div>
          </div>
          <div class="list-toolbar">
            <div>
              <strong>Innlegg</strong>
              <span id="countLine" class="muted"></span>
            </div>
            <select id="statusFilter" aria-label="Statusfilter">
              <option value="">Alle</option>
              <option value="new">Nye</option>
              <option value="candidate">Kandidater</option>
              <option value="needs_edit">Trenger redigering</option>
              <option value="manual_review">Manuell vurdering</option>
              <option value="hold">Vent</option>
              <option value="rejected">Avvist</option>
              <option value="published">Publisert</option>
            </select>
          </div>
          <div id="items" class="items"></div>
        </section>

        <section class="detail">
          <div class="detail-header">
            <h2 id="detailTitle" class="detail-title">Velg et innlegg</h2>
            <div id="detailMeta" class="muted">Importer fra Outlook eller legg inn en manuell test.</div>
          </div>
          <div id="detailBody" class="detail-body"></div>
        </section>
      </div>
    </main>

    <script>
      const state = {
        items: [],
        selectedId: null,
        stories: [],
        topItems: [],
        user: null,
      };

      const els = {
        countLine: document.getElementById('countLine'),
        detailBody: document.getElementById('detailBody'),
        detailMeta: document.getElementById('detailMeta'),
        detailTitle: document.getElementById('detailTitle'),
        fvnStatus: document.getElementById('fvnStatus'),
        fvnStories: document.getElementById('fvnStories'),
        graphStatus: document.getElementById('graphStatus'),
        items: document.getElementById('items'),
        newsroomLogo: document.getElementById('newsroomLogo'),
        plan3Status: document.getElementById('plan3Status'),
        sideMessage: document.getElementById('sideMessage'),
        statusFilter: document.getElementById('statusFilter'),
        supabaseStatus: document.getElementById('supabaseStatus'),
        topItems: document.getElementById('topItems'),
        userLine: document.getElementById('userLine'),
      };

      function setBadge(element, ok, text) {
        element.className = `badge ${ok ? 'ok' : 'warn'}`;
        element.textContent = text;
      }

      function setSideMessage(message, isError = false) {
        els.sideMessage.className = isError ? 'error' : 'muted';
        els.sideMessage.textContent = message;
      }

      function friendlyError(err) {
        const code = err.body?.error;
        const message = err.message || '';

        if (code === 'supabase_not_configured') return 'Supabase mangler env-variabler.';
        if (code === 'graph_not_configured') return 'Outlook/Microsoft Graph mangler env-variabler.';
        if (/invalid path specified/i.test(message)) return 'Supabase URL ser feil ut. Bruk prosjekt-URL-en, ikke en tabell- eller REST-path.';
        return message || 'Ukjent feil.';
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {}),
          },
          ...options,
        });
        const text = await response.text();
        const body = text ? JSON.parse(text) : null;
        if (!response.ok) {
          const error = new Error(body?.detail || body?.error || `HTTP ${response.status}`);
          error.status = response.status;
          error.body = body;
          throw error;
        }
        return body;
      }

      function formatDate(value) {
        if (!value) return 'Ukjent tid';
        return new Intl.DateTimeFormat('nb-NO', {
          dateStyle: 'short',
          timeStyle: 'short',
        }).format(new Date(value));
      }

      function statusLabel(status) {
        return (
          {
            candidate: 'Kandidat',
            hold: 'Vent',
            manual_review: 'Manuell vurdering',
            needs_edit: 'Trenger redigering',
            new: 'Ny',
            published: 'Publisert',
            rejected: 'Avvist',
          }[status] || status || 'Ukjent'
        );
      }

      async function loadStatus() {
        try {
          const payload = await api('/api/status');
          state.user = payload.user;
          els.userLine.textContent = `Innlogget som ${payload.user.name || payload.user.email}`;
          setBadge(els.plan3Status, true, 'OK');
          setBadge(els.supabaseStatus, payload.config.supabase.configured, payload.config.supabase.configured ? 'OK' : 'Mangler env');
          setBadge(els.graphStatus, payload.config.graph.configured, payload.config.graph.configured ? payload.config.graph.mailbox : 'Mangler env');
          setBadge(els.fvnStatus, true, 'Klar');

          if (payload.user.newsroom?.logo) {
            els.newsroomLogo.src = payload.user.newsroom.logo;
            els.newsroomLogo.hidden = false;
          }
        } catch (err) {
          els.userLine.textContent = 'Ikke innlogget.';
          setBadge(els.plan3Status, false, 'Ikke innlogget');
          setBadge(els.fvnStatus, false, 'Ikke innlogget');
          setSideMessage('Logg inn med Plan3 for å bruke verktøyet.', true);
        }
      }

      function renderFvnStories() {
        els.fvnStories.textContent = '';

        if (!state.stories.length) {
          const empty = document.createElement('div');
          empty.className = 'muted';
          empty.textContent = 'Ingen FVN-saker hentet ennå.';
          els.fvnStories.append(empty);
          setBadge(els.fvnStatus, true, '0 saker');
          return;
        }

        setBadge(els.fvnStatus, true, `${state.stories.length} saker`);
        for (const story of state.stories.slice(0, 6)) {
          const link = document.createElement('a');
          link.className = 'story-row';
          link.href = story.url;
          link.target = '_blank';
          link.rel = 'noreferrer';

          const title = document.createElement('div');
          title.className = 'story-title';
          title.textContent = story.title || '(uten tittel)';

          const meta = document.createElement('div');
          meta.className = 'story-meta';
          meta.textContent = `${story.section || 'FVN'} · ${formatDate(story.published_at)}`;

          link.append(title, meta);
          els.fvnStories.append(link);
        }
      }

      async function loadFvnStories() {
        try {
          const payload = await api('/api/fvn/latest?limit=20');
          state.stories = payload.items || [];
          renderFvnStories();
        } catch (err) {
          state.stories = [];
          renderFvnStories();
          setBadge(els.fvnStatus, false, 'Feil');
        }
      }

      function renderItems() {
        els.items.textContent = '';
        els.countLine.textContent = `(${state.items.length})`;

        if (!state.items.length) {
          const empty = document.createElement('div');
          empty.className = 'panel muted';
          empty.textContent = 'Ingen innlegg å vise ennå.';
          els.items.append(empty);
          return;
        }

        for (const item of state.items) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = `item-row ${item.id === state.selectedId ? 'active' : ''}`;
          button.addEventListener('click', () => selectItem(item.id));

          const title = document.createElement('div');
          title.className = 'item-title';
          title.textContent = item.subject || '(uten emne)';

          const meta = document.createElement('div');
          meta.className = 'item-meta';
          meta.textContent = `${statusLabel(item.status)} · ${item.sender_name || item.sender_email || 'Ukjent avsender'} · ${formatDate(item.received_at)}`;

          const preview = document.createElement('div');
          preview.className = 'muted';
          preview.textContent = item.body_preview || '';

          button.append(title, meta, preview);
          els.items.append(button);
        }
      }

      function renderTopItems() {
        els.topItems.textContent = '';

        if (!state.topItems.length) {
          const empty = document.createElement('div');
          empty.className = 'muted';
          empty.textContent = 'Ingen vurderte innlegg ennå.';
          els.topItems.append(empty);
          return;
        }

        for (const [index, item] of state.topItems.entries()) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = `top-row ${item.id === state.selectedId ? 'active' : ''}`;
          button.addEventListener('click', () => selectItem(item.id));

          const title = document.createElement('div');
          title.className = 'top-title';
          title.textContent = `${index + 1}. ${item.suggested_title || item.subject || '(uten emne)'}`;

          const meta = document.createElement('div');
          meta.className = 'top-meta';
          meta.textContent = `${item.priority || 0}/21 · ${statusLabel(item.status)} · ${item.sender_name || item.sender_email || 'Ukjent avsender'}`;

          const connection = document.createElement('div');
          connection.className = 'top-meta';
          connection.textContent = item.fvn_connection ? `FVN: ${item.fvn_connection}` : 'Ingen FVN-kobling';

          button.append(title, meta, connection);
          els.topItems.append(button);
        }
      }

      function renderScoreGrid(item) {
        const scores = item.scores || {};
        const labels = {
          aktualitet: 'Aktualitet',
          fvn_kobling: 'FVN-kobling',
          flere_sider: 'Flere sider',
          lokal_regional: 'Lokal/regional',
          mix: 'Mix',
          relevans: 'Relevans',
          sprak_personlig: 'Språk/stemme',
        };

        const grid = document.createElement('div');
        grid.className = 'score-grid';

        for (const [key, label] of Object.entries(labels)) {
          const box = document.createElement('div');
          box.className = 'score';
          const score = document.createElement('strong');
          score.textContent = scores[key] ?? '-';
          const caption = document.createElement('span');
          caption.className = 'muted';
          caption.textContent = label;
          box.append(score, caption);
          grid.append(box);
        }

        return grid;
      }

      function selectItem(id) {
        state.selectedId = id;
        renderItems();
        renderTopItems();

        const item = state.items.find((candidate) => candidate.id === id)
          || state.topItems.find((candidate) => candidate.id === id);
        if (!item) return;

        els.detailTitle.textContent = item.subject || '(uten emne)';
        els.detailMeta.textContent = `${item.sender_name || 'Ukjent avsender'} · ${item.sender_email || 'ukjent e-post'} · ${formatDate(item.received_at)}`;
        els.detailBody.textContent = '';

        const actions = document.createElement('div');
        actions.className = 'row';

        const evaluateButton = document.createElement('button');
        evaluateButton.type = 'button';
        evaluateButton.textContent = 'Kjør vurdering';
        evaluateButton.addEventListener('click', () => evaluateSelected());

        const statusSelect = document.createElement('select');
        for (const value of ['new', 'candidate', 'needs_edit', 'manual_review', 'hold', 'rejected', 'published']) {
          const option = document.createElement('option');
          option.value = value;
          option.textContent = statusLabel(value);
          option.selected = item.status === value;
          statusSelect.append(option);
        }

        const saveStatusButton = document.createElement('button');
        saveStatusButton.type = 'button';
        saveStatusButton.textContent = 'Lagre status';
        saveStatusButton.addEventListener('click', () => updateSelected({ status: statusSelect.value }));

        actions.append(evaluateButton, statusSelect, saveStatusButton);

        const note = document.createElement('div');
        note.className = item.risk_flags?.length ? 'notice' : 'muted';
        note.textContent = item.editor_note || 'Ingen vurdering kjørt ennå.';

        const fvnConnection = document.createElement('div');
        fvnConnection.className = item.fvn_connection ? 'notice' : 'muted';
        fvnConnection.textContent = item.fvn_connection
          ? `FVN-kobling: ${item.fvn_connection}`
          : 'Ingen FVN-kobling registrert ennå.';

        const body = document.createElement('div');
        body.className = 'body-text';
        body.textContent = item.body_text || item.body_preview || 'Ingen tekst hentet.';

        els.detailBody.append(actions, renderScoreGrid(item), note, fvnConnection);

        if (item.risk_flags?.length) {
          const risks = document.createElement('div');
          risks.className = 'notice';
          risks.textContent = `Risikoflagg: ${item.risk_flags.join(', ')}`;
          els.detailBody.append(risks);
        }

        els.detailBody.append(body);
      }

      async function loadItems() {
        try {
          const status = els.statusFilter.value;
          const payload = await api(`/api/debate/list?limit=50${status ? `&status=${encodeURIComponent(status)}` : ''}`);
          state.items = payload.items || [];
          if (!state.selectedId && state.items[0]) state.selectedId = state.items[0].id;
          renderItems();
          if (state.selectedId) selectItem(state.selectedId);
        } catch (err) {
          state.items = [];
          renderItems();
          setSideMessage(friendlyError(err), true);
        }
      }

      async function loadTopItems() {
        try {
          const payload = await api('/api/debate/top?limit=10');
          state.topItems = payload.items || [];
          renderTopItems();
        } catch (err) {
          state.topItems = [];
          renderTopItems();
        }
      }

      async function importMail() {
        setSideMessage('Importerer fra Outlook...');
        try {
          const payload = await api('/api/mail/import?top=25', { method: 'POST' });
          setSideMessage(`Importerte/oppdaterte ${payload.count} innlegg.`);
          await loadItems();
        } catch (err) {
          setSideMessage(friendlyError(err), true);
        }
      }

      async function previewMail() {
        setSideMessage('Henter forhåndsvisning...');
        try {
          const payload = await api('/api/mail/latest?top=10');
          setSideMessage(`Fant ${payload.count} e-poster i Outlook. Importer for å lagre dem.`);
        } catch (err) {
          setSideMessage(friendlyError(err), true);
        }
      }

      async function importFvnStories() {
        setSideMessage('Henter FVN-saker...');
        try {
          const payload = await api('/api/fvn/import?days=14&limit=120', { method: 'POST' });
          setSideMessage(`Hentet ${payload.count} FVN-saker. Sjekket ${payload.checked} av ${payload.candidates}.`);
          await loadFvnStories();
        } catch (err) {
          setSideMessage(friendlyError(err), true);
        }
      }

      async function evaluateSelected() {
        if (!state.selectedId) return;
        setSideMessage('Kjører vurdering...');
        try {
          const payload = await api('/api/debate/evaluate', {
            body: JSON.stringify({ id: state.selectedId }),
            method: 'POST',
          });
          const index = state.items.findIndex((item) => item.id === state.selectedId);
          if (index >= 0) state.items[index] = payload.item;
          setSideMessage('Vurdering lagret.');
          await loadTopItems();
          selectItem(state.selectedId);
        } catch (err) {
          setSideMessage(friendlyError(err), true);
        }
      }

      async function updateSelected(patch) {
        if (!state.selectedId) return;
        try {
          const payload = await api('/api/debate/update', {
            body: JSON.stringify({ id: state.selectedId, patch }),
            method: 'POST',
          });
          const index = state.items.findIndex((item) => item.id === state.selectedId);
          if (index >= 0) state.items[index] = payload.item;
          setSideMessage('Status lagret.');
          await loadTopItems();
          selectItem(state.selectedId);
        } catch (err) {
          setSideMessage(friendlyError(err), true);
        }
      }

      document.getElementById('loginButton').addEventListener('click', () => {
        window.location.assign('/auth/login');
      });

      document.getElementById('logoutButton').addEventListener('click', () => {
        window.location.assign('/api/auth/logout');
      });

      document.getElementById('refreshButton').addEventListener('click', loadItems);
      document.getElementById('refreshTopButton').addEventListener('click', loadTopItems);
      document.getElementById('importButton').addEventListener('click', importMail);
      document.getElementById('importFvnButton').addEventListener('click', importFvnStories);
      document.getElementById('previewMailButton').addEventListener('click', previewMail);
      els.statusFilter.addEventListener('change', () => {
        state.selectedId = null;
        loadItems();
      });

      document.getElementById('manualForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const formElement = event.currentTarget;
        const form = new FormData(formElement);
        setSideMessage('Lagrer manuelt innlegg...');
        try {
          const payload = await api('/api/debate/manual', {
            body: JSON.stringify(Object.fromEntries(form.entries())),
            method: 'POST',
          });
          formElement.reset();
          state.selectedId = payload.item.id;
          setSideMessage('Manuelt innlegg lagret.');
          await Promise.all([loadItems(), loadTopItems()]);
        } catch (err) {
          setSideMessage(friendlyError(err), true);
        }
      });

      loadStatus().then(() => Promise.all([loadItems(), loadTopItems(), loadFvnStories()]));
    </script>
  </body>
</html>
