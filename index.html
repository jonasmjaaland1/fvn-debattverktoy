<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FVN Debattverktøy</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f4;
        color: #171717;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(680px, calc(100vw - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 52ch;
        margin: 0 0 24px;
        color: #555;
        font-size: 1.05rem;
        line-height: 1.5;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      a {
        border: 1px solid #c7c7c0;
        border-radius: 8px;
        color: inherit;
        display: inline-flex;
        font-weight: 650;
        padding: 12px 14px;
        text-decoration: none;
      }

      a:hover {
        border-color: #171717;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #111;
          color: #f4f4f0;
        }

        p {
          color: #bbb;
        }

        a {
          border-color: #444;
        }

        a:hover {
          border-color: #f4f4f0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>FVN Debattverktøy</h1>
      <p>Auth-tjenesten er deployet. Neste steg er å sette miljøvariabler og teste Plan3-innlogging.</p>
      <nav aria-label="Snarveier">
        <a href="/healthz">Health</a>
        <a href="/auth/login">Plan3-login</a>
        <a href="/api/me">API-test</a>
      </nav>
    </main>
  </body>
</html>
